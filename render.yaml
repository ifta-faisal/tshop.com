services:
  - type: web
    name: roboxpressbd-backend
    env: docker
    rootDir: roboxpressbd-backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/categories
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: MAIL_PASSWORD
        sync: false
