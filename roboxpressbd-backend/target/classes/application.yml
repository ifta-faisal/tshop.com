server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: roboxpressbd-backend
  datasource:
    url: jdbc:mysql://localhost:3306/roboxpressbd?useSSL=false&serverTimezone=Asia/Dhaka&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:roboxpressbd@gmail.com}
    password: ${MAIL_PASSWORD:EcO@01768487848}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-very-long-random-secret-key-256bit-minimum}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
